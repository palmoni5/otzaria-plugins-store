<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>חנות תוספים</title>
  <style>
    /* ── טוקני עיצוב (ערכים זהים למקור) ── */
    :root {
      --color-surface: #f7f3ee;
      --color-surface-card: #fff;
      --color-surface-soft: #faf7f3;
      --color-surface-muted: #f0ece8;
      --color-on-surface: #2c1b02;
      --color-accent: #2c1b02;
      --color-on-accent: #fff;
      --color-primary-hover: #1a1000;
      --color-text: #5a4020;
      --color-text-muted: #7a6040;
      --color-text-faint: #9a7a50;
      --color-icon-faint: #b0956a;
      --color-outline: #e8ddd0;
      --color-outline-strong: #d9ccbe;
      --color-divider: #ede4d8;
      --color-placeholder: #f0e8dc;
      --color-error: #8a3010;
      --color-badge-stable-bg: #e8f0e0;
      --color-badge-stable-fg: #3a6020;
      --color-badge-beta-bg: #f0e8d0;
      --color-badge-beta-fg: #7a5010;
      --color-badge-exp-bg: #f5e8e0;
      --color-shadow-card: rgba(44,27,2,.12);
      --color-shadow-modal: rgba(44,27,2,.18);
      --color-shadow-toast: rgba(44,27,2,.32);
      --color-scrim: rgba(44,27,2,.4);
      --color-scrim-dark: rgba(0,0,0,.85);
      --color-overlay-light: rgba(255,255,255,.15);
      --color-overlay-light-hover: rgba(255,255,255,.3);
      --font-main: 'Segoe UI', Arial, sans-serif;
      --fs-11: 11px; --fs-12: 12px; --fs-13: 13px; --fs-14: 14px;
      --fs-15: 15px; --fs-16: 16px; --fs-18: 18px; --fs-22: 22px;
      --fs-24: 24px; --fs-32: 32px; --fs-40: 40px; --fs-48: 48px;
      --radius-3: 3px; --radius-6: 6px; --radius-8: 8px; --radius-10: 10px;
      --radius-12: 12px; --radius-14: 14px; --radius-16: 16px; --radius-18: 18px;
      --radius-20: 20px; --radius-24: 24px;
      /* טקסט/אייקון מעל שכבה חוצצת כהה (lightbox) — תמיד בהיר, גם במצב כהה */
      --color-on-scrim: #fff;
    }

    /* ── מצב כהה: רוב הצבעים מגיעים מ-theme של אוצריא (applyTheme).
       כאן רק טוקנים שה-theme אינו מספק — צללים, שכבות חוצצות, ותגיות סטטוס. ── */
    body.dark-mode {
      --color-badge-stable-bg: #21311f;
      --color-badge-stable-fg: #a3cf86;
      --color-badge-beta-bg: #34301a;
      --color-badge-beta-fg: #e0bd66;
      --color-badge-exp-bg: #3a261c;
      --color-shadow-card: rgba(0,0,0,.45);
      --color-shadow-modal: rgba(0,0,0,.55);
      --color-shadow-toast: rgba(0,0,0,.6);
      --color-scrim: rgba(0,0,0,.6);
      --color-scrim-dark: rgba(0,0,0,.88);
    }

    html, body {   overflow-x: hidden; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: var(--color-surface);
      color: var(--color-on-surface);
      direction: rtl;
    }

    /* ── כותרת ── */
    header {
      background: var(--color-surface-card);
      border-bottom: 1px solid var(--color-outline);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: var(--fs-18); font-weight: 700; color: var(--color-on-surface); flex: 1; }
    #plugin-count { font-size: var(--fs-13); color: var(--color-text-muted); }

    #refresh-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--color-outline-strong);
      background: var(--color-surface-soft);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--fs-16);
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    #refresh-btn:hover { background: var(--color-surface-muted); border-color: var(--color-on-surface); }
    #refresh-btn.spinning { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── פילטרים ── */
    #filters {
      background: var(--color-surface-card);
      padding: 12px 20px;
      border-bottom: 1px solid var(--color-outline);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    #search {
      flex: 1;
      min-width: 180px;
      padding: 8px 12px;
      border: 1px solid var(--color-outline-strong);
      border-radius: var(--radius-8);
      font-size: var(--fs-14);
      background: var(--color-surface-soft);
      color: var(--color-on-surface);
      outline: none;
      direction: rtl;
    }
    #search::placeholder { color: var(--color-text-faint); }
    #search:focus { border-color: var(--color-on-surface); }

    #status-filter {
      padding: 8px 12px;
      border: 1px solid var(--color-outline-strong);
      border-radius: var(--radius-8);
      font-size: var(--fs-14);
      background: var(--color-surface-soft);
      color: var(--color-on-surface);
      outline: none;
      direction: rtl;
    }

    /* ── תגיות ── */
    #tags-wrap { background: var(--color-surface-soft); border-bottom: 1px solid var(--color-divider); }
    #tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 20px 6px; }
    #tags.collapsed { overflow: hidden; }
    #tags-toggle {
      display: block;
      margin: 0 20px 10px;
      padding: 4px 14px;
      border-radius: var(--radius-20);
      font-size: var(--fs-12);
      font-weight: 600;
      cursor: pointer;
      border: 1px dashed var(--color-outline-strong);
      background: var(--color-surface-card);
      color: var(--color-text);
      transition: all .15s;
    }
    #tags-toggle:hover { border-color: var(--color-on-surface); color: var(--color-on-surface); }
    .tag-btn {
      padding: 4px 12px;
      border-radius: var(--radius-20);
      font-size: var(--fs-12);
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--color-outline-strong);
      background: var(--color-surface-card);
      color: var(--color-text);
      transition: all .15s;
    }
    .tag-btn:hover { border-color: var(--color-on-surface); color: var(--color-on-surface); }
    .tag-btn.active { background: var(--color-accent); color: var(--color-on-accent); border-color: var(--color-accent); }

    /* ── רשת כרטיסים ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .card {
      background: var(--color-surface-card);
      border-radius: var(--radius-14);
      border: 1px solid var(--color-outline);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .2s;
      cursor: pointer;
    }
    .card:hover { box-shadow: 0 6px 24px var(--color-shadow-card); transform: translateY(-2px); }

    .card-img {
      width: 100%;
      aspect-ratio: 16/11;
      object-fit: cover;
      background: var(--color-surface-card);
    }
    .card-img.is-default { object-fit: contain; padding: 16px; }
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 16/11;
      background: linear-gradient(135deg, var(--color-placeholder), var(--color-outline));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs-32);
      color: var(--color-icon-faint);
    }

    .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      padding: 2px 10px;
      border-radius: var(--radius-20);
      font-size: var(--fs-11);
      font-weight: 700;
    }
    .badge-stable   { background: var(--color-badge-stable-bg); color: var(--color-badge-stable-fg); }
    .badge-beta     { background: var(--color-badge-beta-bg); color: var(--color-badge-beta-fg); }
    .badge-experimental { background: var(--color-badge-exp-bg); color: var(--color-error); }
    .badge-version  { background: var(--color-surface-muted); color: var(--color-text); }
    .badge-downloads {
      background: var(--color-surface-muted);
      color: var(--color-text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .badge-downloads svg { width: 12px; height: 12px; }

    .card-title { font-size: var(--fs-16); font-weight: 700; color: var(--color-on-surface); }
    .card-desc  { font-size: var(--fs-13); color: var(--color-text); line-height: 1.5; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .card-tag {
      padding: 2px 8px;
      border-radius: var(--radius-20);
      font-size: var(--fs-11);
      background: var(--color-surface-muted);
      color: var(--color-text-muted);
    }

    .card-actions { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: var(--radius-20);
      font-size: var(--fs-13);
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      border: none;
      transition: all .15s;
    }
    .btn-primary { background: var(--color-accent); color: var(--color-on-accent); }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-secondary { background: var(--color-surface-card); color: var(--color-on-surface); border: 1.5px solid var(--color-outline-strong); }
    .btn-secondary:hover { background: var(--color-surface); border-color: var(--color-on-surface); }

    /* ── מצבים ── */
    #loading, #error, #empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; gap: 12px; text-align: center;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--color-outline);
      border-top-color: var(--color-on-surface);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    #error .icon { font-size: var(--fs-40); }
    #error p { color: var(--color-error); font-size: var(--fs-14); }
    .hidden { display: none !important; }

    /* ── מודל עדכונים ── */
    #updates-backdrop {
      position: fixed;
      inset: 0;
      background: var(--color-scrim);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #updates-modal {
      background: var(--color-surface-card);
      border-radius: var(--radius-18);
      border: 1px solid var(--color-outline);
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 16px 48px var(--color-shadow-modal);
    }
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--color-divider);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-header-icon { font-size: var(--fs-22); }
    .modal-header h2 { font-size: var(--fs-16); font-weight: 700; flex: 1; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: var(--fs-18); color: var(--color-text-faint); line-height: 1;
      padding: 4px; border-radius: var(--radius-6); transition: color .15s;
    }
    .modal-close:hover { color: var(--color-on-surface); }
    .modal-body {  flex: 1; padding: 12px 0; }
    .update-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--color-surface-muted);
    }
    .update-row:last-child { border-bottom: none; }
    .update-info { flex: 1; min-width: 0; }
    .update-name { font-size: var(--fs-14); font-weight: 700; color: var(--color-on-surface); }
    .update-versions { font-size: var(--fs-12); color: var(--color-text-faint); margin-top: 2px; }
    .update-btn {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: var(--radius-20);
      font-size: var(--fs-12);
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: var(--color-accent);
      color: var(--color-on-accent);
      transition: background .15s;
      white-space: nowrap;
    }
    .update-btn:hover { background: var(--color-primary-hover); }
    .update-btn:disabled { opacity: .6; cursor: default; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--color-divider);
      display: flex;
      justify-content: flex-end;
    }
    .update-all-btn {
      padding: 8px 20px;
      border-radius: var(--radius-20);
      font-size: var(--fs-13);
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: var(--color-accent);
      color: var(--color-on-accent);
      transition: background .15s;
    }
    .update-all-btn:hover { background: var(--color-primary-hover); }
    .update-all-btn:disabled { opacity: .6; cursor: default; }

    /* ── דף פרטי תוסף ── */
    #detail-page {
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text);
      font-size: var(--fs-14);
      font-weight: 600;
      padding: 6px 0;
      margin-bottom: 16px;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--color-on-surface); }
    .back-arrow { font-size: var(--fs-18); line-height: 1; }

    .detail-header {
      background: var(--color-surface-card);
      border-radius: var(--radius-16);
      border: 1px solid var(--color-outline);
      padding: 24px;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .detail-header { grid-template-columns: 1fr; }
    }

    .detail-main-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: var(--radius-12);
      background: var(--color-surface-card);
    }
    .detail-main-img.is-default { object-fit: contain; padding: 24px; }
    .detail-main-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, var(--color-placeholder), var(--color-outline));
      border-radius: var(--radius-12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs-48);
      color: var(--color-icon-faint);
    }

    .detail-info { display: flex; flex-direction: column; gap: 12px; }
    .detail-name { font-size: var(--fs-24); font-weight: 800; color: var(--color-on-surface); line-height: 1.3; }
    .detail-desc { font-size: var(--fs-14); color: var(--color-text); line-height: 1.7; white-space: pre-wrap; }
    .detail-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .detail-install-btn {
      padding: 10px 24px;
      border-radius: var(--radius-24);
      font-size: var(--fs-14);
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: var(--color-accent);
      color: var(--color-on-accent);
      transition: background .15s;
    }
    .detail-install-btn:hover { background: var(--color-primary-hover); }
    .detail-install-btn:disabled { opacity: .6; cursor: default; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 500px) { .detail-grid { grid-template-columns: 1fr; } }

    .detail-card {
      background: var(--color-surface-card);
      border-radius: var(--radius-14);
      border: 1px solid var(--color-outline);
      padding: 18px;
    }
    .detail-card h2 {
      font-size: var(--fs-15);
      font-weight: 700;
      color: var(--color-on-surface);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-card h2 .icon { font-size: var(--fs-18); }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .info-cell {
      background: var(--color-surface-soft);
      border-radius: var(--radius-10);
      padding: 10px 12px;
    }
    .info-cell.full { grid-column: 1 / -1; }
    .info-label { font-size: var(--fs-11); color: var(--color-text-faint); margin-bottom: 3px; }
    .info-value { font-size: var(--fs-13); font-weight: 700; color: var(--color-on-surface); }

    .detail-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .detail-tag {
      padding: 4px 14px;
      border-radius: var(--radius-20);
      font-size: var(--fs-12);
      font-weight: 500;
      background: var(--color-surface-muted);
      color: var(--color-text-muted);
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
    }
    .detail-tag:hover { border-color: var(--color-on-surface); color: var(--color-on-surface); }

    .screenshots-section {
      background: var(--color-surface-card);
      border-radius: var(--radius-14);
      border: 1px solid var(--color-outline);
      padding: 18px;
      margin-bottom: 16px;
    }
    .screenshots-section h2 {
      font-size: var(--fs-15);
      font-weight: 700;
      color: var(--color-on-surface);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .screenshots-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 6px;
      scroll-snap-type: x mandatory;
    }
    .screenshots-row::-webkit-scrollbar { height: 6px; }
    .screenshots-row::-webkit-scrollbar-thumb { background: var(--color-outline-strong); border-radius: var(--radius-3); }
    .screenshot-thumb {
      flex-shrink: 0;
      width: 220px;
      aspect-ratio: 16/11;
      object-fit: cover;
      border-radius: var(--radius-10);
      border: 1px solid var(--color-outline);
      cursor: pointer;
      scroll-snap-align: start;
      transition: transform .15s;
    }
    .screenshot-thumb:hover { transform: scale(1.02); }

    /* ── lightbox ── */
    #lightbox {
      position: fixed;
      inset: 0;
      background: var(--color-scrim-dark);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: var(--radius-10);
      object-fit: contain;
    }
    #lightbox-close {
      position: absolute;
      top: 16px;
      left: 16px;
      background: var(--color-overlay-light);
      border: none;
      color: var(--color-on-scrim);
      font-size: var(--fs-24);
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    #lightbox-close:hover { background: var(--color-overlay-light-hover); }

    /* ── הודעת תוסף חדש ── */
    #new-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-accent);
      color: var(--color-on-accent);
      border-radius: var(--radius-14);
      padding: 12px 14px 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px var(--color-shadow-toast);
      z-index: 80;
      max-width: calc(100% - 40px);
      animation: toast-in .3s ease;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translate(-50%, 24px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    #new-toast .toast-icon { display: flex; flex-shrink: 0; }
    #new-toast .toast-text { font-size: var(--fs-14); font-weight: 700; flex: 1; white-space: nowrap; }
    #new-toast .toast-view {
      flex-shrink: 0;
      padding: 6px 18px;
      border-radius: var(--radius-20);
      font-size: var(--fs-13);
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: var(--color-surface-card);
      color: var(--color-on-surface);
      transition: background .15s;
    }
    #new-toast .toast-view:hover { background: var(--color-surface-muted); }
    #new-toast .toast-close {
      background: none; border: none; cursor: pointer;
      font-size: var(--fs-16); color: var(--color-icon-faint); line-height: 1;
      padding: 4px; transition: color .15s;
    }
    #new-toast .toast-close:hover { color: var(--color-on-accent); }
  </style>
</head>
<body>

<header>
  <h1>חנות תוספים</h1>
  <span id="plugin-count"></span>
  <button id="refresh-btn" title="רענן רשימה"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
</header>

<div id="filters">
  <input id="search" type="search" placeholder="חיפוש לפי שם, תיאור או תגית...">
  <select id="status-filter">
    <option value="all">כל הסטטוסים</option>
    <option value="stable">יציב</option>
    <option value="beta">בטא</option>
    <option value="experimental">ניסיוני</option>
  </select>
</div>

<div id="tags-wrap" class="hidden">
  <div id="tags"></div>
  <button id="tags-toggle" class="hidden"></button>
</div>

<div id="loading"><div class="spinner"></div><p>טוען תוספים...</p></div>
<div id="error" class="hidden"><span class="icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8a3010" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span><p id="error-msg"></p></div>
<div id="grid" class="hidden"></div>
<div id="empty" class="hidden"><p>לא נמצאו תוספים לפי הסינון.</p></div>

<div id="detail-page" class="hidden"></div>

<div id="updates-backdrop" class="hidden">
  <div id="updates-modal">
    <div class="modal-header">
      <span class="modal-header-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></span>
      <h2 id="updates-title"></h2>
      <button class="modal-close" id="updates-close">✕</button>
    </div>
    <div class="modal-body" id="updates-list"></div>
    <div class="modal-footer">
      <button class="update-all-btn" id="update-all-btn">עדכן הכל</button>
    </div>
  </div>
</div>

<div id="lightbox" class="hidden">
  <button id="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<div id="new-toast" class="hidden">
  <span class="toast-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 4.6L18 9l-4.4 1.4L12 15l-1.6-4.6L6 9l4.4-1.4L12 3z"/><path d="M19 14l.8 2.2L22 17l-2.2.8L19 20l-.8-2.2L16 17l2.2-.8L19 14z"/></svg></span>
  <span class="toast-text" id="new-toast-text"></span>
  <button class="toast-view" id="new-toast-view">צפה</button>
  <button class="toast-close" id="new-toast-close" title="סגור">✕</button>
</div>

<script>
  const API = 'https://otzaria.org/api/plugins';
  const BASE = 'https://otzaria.org';
  // תמונת ברירת מחדל לתוסף ללא תמונה. נטענת ישירות מ-otzaria.org (כבר ב-allowlist),
  // לא נארזת בחבילה — הקובץ ~2MB והחנות ממילא דורשת רשת.
  const DEFAULT_IMG = BASE + '/logo.svg';

  let allPlugins = [];
  let installedPlugins = [];   // [{ name, version }]
  let installedVersionByName = new Map();   // שם → גרסה מותקנת
  let activeTag = 'all';
  let appVersion = null;       // גרסת אוצריא המותקנת, לסינון תאימות

  const statusLabel = { stable: 'יציב', beta: 'בטא', experimental: 'ניסיוני' };
  const statusClass = { stable: 'badge-stable', beta: 'badge-beta', experimental: 'badge-experimental' };

  // ── עדכונים ─────────────────────────────────────────────────────
  // השוואת גרסאות SemVer: מחזיר 1 אם a>b, -1 אם a<b, 0 אם שוות.
  function compareVersions(a, b) {
    const parse = v => String(v ?? '').split('.').map(n => parseInt(n, 10) || 0);
    const pa = parse(a), pb = parse(b);
    const len = Math.max(pa.length, pb.length);
    for (let i = 0; i < len; i++) {
      const d = (pa[i] || 0) - (pb[i] || 0);
      if (d !== 0) return d > 0 ? 1 : -1;
    }
    return 0;
  }

  // תוסף תואם רק אם גרסת אוצריא המותקנת בטווח [compatibleWith, maxAppVersion].
  // כשהגרסה אינה ידועה (כשל ב-app.getInfo) — לא מסתירים דבר.
  function isCompatible(p) {
    if (!appVersion) return true;
    if (p.compatibleWith && compareVersions(appVersion, p.compatibleWith) < 0) return false;
    if (p.maxAppVersion && compareVersions(appVersion, p.maxAppVersion) > 0) return false;
    return true;
  }

  function getAvailableUpdates() {
    return installedPlugins.flatMap(inst => {
      // מציגים עדכון רק אם הגרסה בחנות גבוהה מהמותקנת — לא אם המותקנת גבוהה יותר.
      const newer = allPlugins.find(p => p.name === inst.name && compareVersions(p.version, inst.version) > 0);
      return newer ? [{ installed: inst, plugin: newer }] : [];
    });
  }

  function showUpdatesModal(updates) {
    document.getElementById('updates-title').textContent =
      `עדכונים זמינים (${updates.length})`;

    const list = document.getElementById('updates-list');
    list.innerHTML = '';
    updates.forEach(({ installed, plugin }) => {
      const downloadUrl = plugin.downloadUrl.startsWith('http')
        ? plugin.downloadUrl : BASE + plugin.downloadUrl;
      const row = document.createElement('div');
      row.className = 'update-row';
      row.innerHTML = `
        <div class="update-info">
          <div class="update-name">${esc(plugin.name)}</div>
          <div class="update-versions">${esc(installed.version)} ← ${esc(plugin.version)}</div>
        </div>
        <button class="update-btn" data-url="${esc(downloadUrl)}">עדכן</button>`;
      list.appendChild(row);
    });

    list.querySelectorAll('.update-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        btn.textContent = 'מעדכן...';
        await installPlugin(btn.dataset.url);
        btn.textContent = 'נשלח ✓';
      });
    });

    const updateAllBtn = document.getElementById('update-all-btn');
    updateAllBtn.disabled = false;
    updateAllBtn.textContent = 'עדכן הכל';
    updateAllBtn.onclick = async () => {
      updateAllBtn.disabled = true;
      updateAllBtn.textContent = 'שולח...';
      const btns = list.querySelectorAll('.update-btn:not(:disabled)');
      for (const btn of btns) {
        btn.disabled = true;
        btn.textContent = 'מעדכן...';
        await installPlugin(btn.dataset.url);
        btn.textContent = 'נשלח ✓';
      }
      updateAllBtn.textContent = 'הכל נשלח ✓';
    };

    show('updates-backdrop');
  }

  document.getElementById('updates-close').onclick = () => hide('updates-backdrop');
  document.getElementById('updates-backdrop').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) hide('updates-backdrop');
  });

  // ── תוספים חדשים בחנות ──────────────────────────────────────────
  // מפתח v2: הזהות נשמרת לפי id היציב (ולא לפי השם שעלול להשתנות).
  // החלפת המפתח מהגרסה הישנה (שמות) גורמת לטעינה הראשונה רק לשמור, בלי הודעה.
  const KNOWN_KEY = 'otzaria_store_known_plugins_v2';

  function checkNewPlugins() {
    let known = null;
    try { known = JSON.parse(localStorage.getItem(KNOWN_KEY)); } catch {}

    const currentIds = allPlugins.map(p => p.id);
    try { localStorage.setItem(KNOWN_KEY, JSON.stringify(currentIds)); } catch {}

    // בטעינה הראשונה (אין נתון קודם) רק שומרים, בלי הודעה
    if (!Array.isArray(known)) return;

    const knownSet = new Set(known);
    // תוסף שכבר מותקן אצל המשתמש אינו "חדש בחנות", גם אם נכנס לקטלוג עכשיו
    const installedNames = new Set(installedPlugins.map(p => p.name));
    const newPlugins = allPlugins.filter(p =>
      !knownSet.has(p.id) && !installedNames.has(p.name));
    if (newPlugins.length > 0) showNewToast(newPlugins);
  }

  function showNewToast(newPlugins) {
    // תור התוספים החדשים שעוד לא נצפו
    let pending = newPlugins.slice();

    function update() {
      if (pending.length === 0) { hide('new-toast'); return; }
      document.getElementById('new-toast-text').textContent = pending.length === 1
        ? 'תוסף חדש בחנות!'
        : `${pending.length} תוספים חדשים בחנות!`;
      show('new-toast');
    }

    document.getElementById('new-toast-view').onclick = () => {
      const next = pending.shift();   // מסירים את הראשון מהתור
      update();                       // ההודעה נשארת עם השאר שעוד לא נצפו
      showDetail(next);
    };

    update();
  }

  document.getElementById('new-toast-close').onclick = () => hide('new-toast');

  // ── רענון ────────────────────────────────────────────────────────
  const refreshBtn = document.getElementById('refresh-btn');
  refreshBtn.addEventListener('click', () => {
    if (refreshBtn.classList.contains('spinning')) return;
    reload();
  });

  async function reload() {
    refreshBtn.classList.add('spinning');
    hide('grid'); hide('empty'); hide('error');
    show('loading');
    allPlugins = [];
    installedPlugins = [];
    installedVersionByName = new Map();
    try {
      const [fetchRes, installedRes] = await Promise.all([
        Otzaria.call('network.fetch', { url: API }),
        Otzaria.call('plugin.listInstalled', {}),
      ]);
      if (!fetchRes.success) throw new Error(fetchRes.error?.message || 'שגיאת רשת');
      if (fetchRes.data.status !== 200) throw new Error(`HTTP ${fetchRes.data.status}`);
      allPlugins = JSON.parse(fetchRes.data.body);
      // סינון תאימות במקור — מסתיר תוספים לא תואמים מהחנות, ממודל העדכונים
      // ומהודעת "תוסף חדש" כאחד (כולל עדכון לגרסה שכבר אינה תואמת).
      allPlugins = allPlugins.filter(isCompatible);
      if (installedRes.success) {
        installedPlugins = installedRes.data;
        installedPlugins.forEach(p => installedVersionByName.set(p.name, p.version));
      }
      initTags();
      render();
      show('grid');
      hide('new-toast');
      checkNewPlugins();
      const updates = getAvailableUpdates();
      if (updates.length > 0) showUpdatesModal(updates);
    } catch (e) {
      document.getElementById('error-msg').textContent = 'שגיאה בטעינת התוספים: ' + e.message;
      show('error');
    }
    hide('loading');
    refreshBtn.classList.remove('spinning');
  }

  // ── ערכת צבעים: מושכים כמה שיותר צבעים מ-theme האמיתי של אוצריא ──────
  //    (רקע, טקסט, מסגרות, הדגשה, שגיאה). הפלטה החמה ב-:root היא רק ברירת
  //    מחדל אם theme לא נמסר. צבעי סטטוס/צללים נשארים מקומיים (אין להם תפקיד
  //    מתאים ב-Material של אוצריא) — ראה body.dark-mode.
  function darken(hex, amt) {
    const m = /^#?([0-9a-fA-F]{6})$/.exec(hex && hex.trim());
    if (!m) return hex;
    const n = parseInt(m[1], 16);
    const r = Math.round(((n >> 16) & 255) * (1 - amt));
    const g = Math.round(((n >> 8) & 255) * (1 - amt));
    const b = Math.round((n & 255) * (1 - amt));
    return '#' + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
  }

  function applyTheme(theme) {
    if (!theme) return;
    document.body.classList.toggle('dark-mode', theme.mode === 'dark');
    const cs = theme.colorScheme;
    if (!cs) return;
    const root = document.documentElement;
    const set = (k, v) => { if (v) root.style.setProperty(k, v); };

    const high = cs.surfaceContainerHigh || cs.surface;            // שכבת רקע עדינה
    const onVar = cs.onSurfaceVariant || cs.onSurface;             // טקסט משני
    const outlineSoft = cs.outlineVariant || cs.outline;          // מסגרת עדינה

    // רקעים
    set('--color-surface', high);                                 // רקע כללי של הדף
    set('--color-surface-card', cs.surface);                      // כרטיסים/כותרת/חלוניות
    set('--color-surface-soft', high);                            // שדות קלט, סרגל תגיות
    set('--color-surface-muted', cs.surfaceContainerHighest);     // צ'יפים, badge גרסה
    set('--color-placeholder', cs.surfaceContainerHighest);       // רקע placeholder לתמונה
    // טקסט
    set('--color-on-surface', cs.onSurface);
    set('--color-text', onVar);
    set('--color-text-muted', onVar);
    set('--color-text-faint', onVar);
    set('--color-icon-faint', onVar);
    // מסגרות ומפרידים
    set('--color-outline', outlineSoft);
    set('--color-outline-strong', cs.outline);
    set('--color-divider', outlineSoft);
    // שגיאה
    set('--color-error', cs.error);
    // הדגשה — כפתורים ראשיים, תגית פעילה, טוסט
    set('--color-accent', cs.primary);
    set('--color-on-accent', cs.onPrimary);
    set('--color-primary-hover', darken(cs.primary, 0.12));
  }

  // ה-theme מגיע כבר ב-plugin.boot (ללא הרשאה); נתפוס אותו מוקדם ככל האפשר.
  try {
    Otzaria.on('plugin.boot', p => { if (p && p.theme) applyTheme(p.theme); });
    // עדכון חי כשהמשתמש מחליף ערכת צבעים/מצב כהה (הרשאה: events.subscribe:theme.changed)
    Otzaria.on('theme.changed', applyTheme);
  } catch {}

  // ── טעינה ראשונית ────────────────────────────────────────────────
  async function loadPlugins() {
    await new Promise(resolve => window.addEventListener('plugin.ready', resolve, { once: true }));
    // קריאה מפורשת כדי לוודא את המצב הנוכחי גם אם plugin.boot כבר חלף
    try {
      const res = await Otzaria.call('app.getTheme', {});
      if (res && res.success) applyTheme(res.data);
    } catch {}
    // גרסת אוצריא קבועה לאורך הריצה — מספיק למשוך פעם אחת לפני הטעינה
    try {
      const info = await Otzaria.call('app.getInfo', {});
      if (info && info.success) appVersion = info.data.version;
    } catch {}
    await reload();
  }

  // ── תגיות ────────────────────────────────────────────────────────
  function initTags() {
    const tagSet = new Set();
    allPlugins.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
    const sorted = [...tagSet].sort((a, b) => a.localeCompare(b, 'he'));

    const container = document.getElementById('tags');
    container.innerHTML = '';
    container.appendChild(makeTag('כל התגיות', 'all', true));
    sorted.forEach(t => container.appendChild(makeTag(t, t, false)));
    document.getElementById('tags-wrap').classList.remove('hidden');
    tagsExpanded = false;
    updateTagsToggle();
  }

  // הגבלת אזור התגיות ל-3 שורות עם לחצן "הצג עוד"
  let tagsExpanded = false;

  function updateTagsToggle() {
    const tags = document.getElementById('tags');
    const toggle = document.getElementById('tags-toggle');
    if (!tags.children.length || !tags.offsetParent) {
      toggle.classList.add('hidden');
      return;
    }

    const rowH = tags.children[0].offsetHeight;
    const gap = 6;
    const collapsedMax = rowH * 3 + gap * 2;

    if (tags.scrollHeight <= collapsedMax + 1) {
      toggle.classList.add('hidden');
      tags.classList.remove('collapsed');
      tags.style.maxHeight = '';
      return;
    }

    toggle.classList.remove('hidden');
    if (tagsExpanded) {
      tags.classList.remove('collapsed');
      tags.style.maxHeight = '';
      toggle.textContent = 'הצג פחות';
    } else {
      tags.classList.add('collapsed');
      tags.style.maxHeight = collapsedMax + 'px';
      toggle.textContent = 'הצג עוד';
    }
  }

  document.getElementById('tags-toggle').addEventListener('click', () => {
    tagsExpanded = !tagsExpanded;
    updateTagsToggle();
  });

  let tagsResizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(tagsResizeTimer);
    tagsResizeTimer = setTimeout(updateTagsToggle, 150);
  });

  function makeTag(label, value, active) {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (active ? ' active' : '');
    btn.textContent = label;
    btn.dataset.value = value;
    btn.onclick = () => {
      activeTag = value;
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    return btn;
  }

  // ── רינדור רשת כרטיסים ──────────────────────────────────────────
  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const status = document.getElementById('status-filter').value;

    const list = allPlugins.filter(p => {
      // תוסף מותקן יוצג רק אם בחנות יש גרסה חדשה ממנו (עדכון). גרסה זהה או
      // ישנה יותר — מסתירים. תוסף שאינו מותקן — מוצג תמיד.
      const inst = installedVersionByName.get(p.name);
      return inst === undefined || compareVersions(p.version, inst) > 0;
    }).filter(p => {
      if (status !== 'all' && p.status !== status) return false;
      if (activeTag !== 'all' && !(p.tags || []).includes(activeTag)) return false;
      if (q) {
        const hay = [p.name, p.shortDescription, p.description, ...(p.tags || [])].join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    const countEl = document.getElementById('plugin-count');
    countEl.textContent = list.length === allPlugins.length
      ? `${allPlugins.length} תוספים`
      : `${list.length} מתוך ${allPlugins.length}`;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (list.length === 0) { show('empty'); hide('grid'); return; }
    hide('empty'); show('grid');
    list.forEach(p => grid.appendChild(makeCard(p)));
  }

  function makeCard(p) {
    const art = document.createElement('article');
    art.className = 'card';

    const downloadUrl = p.downloadUrl.startsWith('http') ? p.downloadUrl : BASE + p.downloadUrl;
    const hasImg = !!p.image;
    const imgUrl = hasImg ? (p.image.startsWith('http') ? p.image : BASE + p.image) : DEFAULT_IMG;

    art.innerHTML = `
      <img class="card-img${hasImg ? '' : ' is-default'}" src="${esc(imgUrl)}" alt="${esc(p.name)}" loading="lazy">
      <div class="card-body">
        <div class="card-badges">
          <span class="badge ${statusClass[p.status] || ''}">${statusLabel[p.status] || p.status}</span>
          <span class="badge badge-version">גרסה ${esc(p.version)}</span>
          ${downloadsBadge(p)}
        </div>
        <div class="card-title">${esc(p.name)}</div>
        <div class="card-desc">${esc(p.shortDescription || '')}</div>
        ${(p.tags || []).length > 0
          ? `<div class="card-tags">${p.tags.slice(0,4).map(t => `<span class="card-tag">${esc(t)}</span>`).join('')}</div>`
          : ''}
        <div class="card-actions">
          <button class="btn btn-primary install-btn" data-url="${esc(downloadUrl)}">התקנה</button>
        </div>
      </div>`;

    art.addEventListener('click', (e) => {
      if (e.target.closest('.install-btn')) return;
      showDetail(p);
    });

    return art;
  }

  // ── דף פרטים ────────────────────────────────────────────────────
  function showDetailPage() {
    hide('filters'); hide('tags-wrap'); hide('grid'); hide('empty'); hide('loading'); hide('error');
    document.getElementById('plugin-count').textContent = '';
    show('detail-page');
  }

  function showListPage() {
    hide('detail-page');
    show('filters');
    document.getElementById('tags-wrap').classList.remove('hidden');
    updateTagsToggle();
    render();
  }

  function showDetail(p) {
    showDetailPage();

    const downloadUrl = p.downloadUrl.startsWith('http') ? p.downloadUrl : BASE + p.downloadUrl;
    const hasImg = !!p.image;
    const imgUrl = hasImg ? (p.image.startsWith('http') ? p.image : BASE + p.image) : DEFAULT_IMG;
    const screenshots = (p.screenshots || []).map(s => s.startsWith('http') ? s : BASE + s);

    const detail = document.getElementById('detail-page');
    detail.innerHTML = `
      <button class="back-btn" id="back-btn"><span class="back-arrow">→</span> חזרה לחנות</button>
      <div class="detail-header">
        <img class="detail-main-img${hasImg ? '' : ' is-default'}" src="${esc(imgUrl)}" alt="${esc(p.name)}" loading="lazy">
        <div class="detail-info">
          <div class="detail-name">${esc(p.name)}</div>
          <div class="detail-badges">
            <span class="badge ${statusClass[p.status] || ''}">${statusLabel[p.status] || esc(p.status)}</span>
            <span class="badge badge-version">גרסה ${esc(p.version)}</span>
            ${downloadsBadge(p)}
          </div>
          <div class="detail-desc">${esc(p.description || p.shortDescription || '')}</div>
          <div class="detail-actions">
            <button class="detail-install-btn" id="detail-install-btn" data-url="${esc(downloadUrl)}">התקנה</button>
          </div>
        </div>
      </div>
      <div class="detail-grid">
        <div class="detail-card">
          <h2><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span> מידע כללי</h2>
          <div class="info-grid">
            <div class="info-cell">
              <div class="info-label">גרסה</div>
              <div class="info-value">${esc(p.version)}</div>
            </div>
            <div class="info-cell">
              <div class="info-label">סטטוס</div>
              <div class="info-value">${statusLabel[p.status] || esc(p.status)}</div>
            </div>
            <div class="info-cell">
              <div class="info-label">הורדות</div>
              <div class="info-value">${fmtNum(p.downloadCount)}</div>
            </div>
            ${p.author ? `
            <div class="info-cell">
              <div class="info-label">מפתח</div>
              <div class="info-value">${esc(p.author)}</div>
            </div>` : ''}
            ${p.updatedAt ? `
            <div class="info-cell">
              <div class="info-label">עודכן</div>
              <div class="info-value">${esc(formatDate(p.originalDate || p.updatedAt))}</div>
            </div>` : ''}
            ${p.compatibleWith ? `
            <div class="info-cell full">
              <div class="info-label">תאימות</div>
              <div class="info-value">${esc(p.compatibleWith)}</div>
            </div>` : ''}
            <div class="info-cell full">
              <div class="info-label">חיבור אינטרנט</div>
              <div class="info-value">${p.requiresNetwork ? 'נדרש' : '✓ לא נדרש'}</div>
            </div>
          </div>
        </div>
        <div class="detail-card">
          <h2><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span> תגיות</h2>
          <div class="detail-tags">
            ${(p.tags || []).map(t => `<span class="detail-tag" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}
          </div>
        </div>
      </div>
      ${screenshots.length > 0 ? `
      <div class="screenshots-section">
        <h2><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></span> צילומי מסך</h2>
        <div class="screenshots-row">
          ${screenshots.map(s => `<img class="screenshot-thumb" src="${esc(s)}" alt="צילום מסך" loading="lazy">`).join('')}
        </div>
      </div>` : ''}`;

    document.getElementById('back-btn').onclick = showListPage;

    document.getElementById('detail-install-btn').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      btn.disabled = true;
      btn.textContent = 'מתקין...';
      try {
        await installPlugin(btn.dataset.url);
        btn.textContent = 'נשלח ✓';
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'התקנה';
        alert('שגיאה בהתקנה: ' + err.message);
      }
    });

    detail.querySelectorAll('.detail-tag').forEach(tagEl => {
      tagEl.addEventListener('click', () => {
        showListPage();
        activeTag = tagEl.dataset.tag;
        document.querySelectorAll('.tag-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.value === activeTag);
        });
        render();
      });
    });

    detail.querySelectorAll('.screenshot-thumb').forEach(img => {
      img.addEventListener('click', () => {
        document.getElementById('lightbox-img').src = img.src;
        show('lightbox');
      });
    });
  }

  // ── כלים ─────────────────────────────────────────────────────────
  // אייקון הורדה (feather download)
  const DOWNLOAD_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

  function fmtNum(n) {
    return (Number(n) || 0).toLocaleString('he-IL');
  }

  // תגית כמות הורדות. מוצגת תמיד (גם 0), כדי לשמור על מראה אחיד עם האתר.
  function downloadsBadge(p) {
    return `<span class="badge badge-downloads" title="כמות הורדות">${DOWNLOAD_ICON}${fmtNum(p.downloadCount)} הורדות</span>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(dateStr) {
    try {
      const d = dateStr.includes('T') ? new Date(dateStr) : new Date(dateStr + 'T12:00:00Z');
      return d.toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' });
    } catch { return dateStr; }
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  async function installPlugin(downloadUrl) {
    await Otzaria.call('plugin.requestInstall', { url: downloadUrl });
  }

  document.getElementById('grid').addEventListener('click', async (e) => {
    const btn = e.target.closest('.install-btn');
    if (!btn) return;
    btn.disabled = true;
    btn.textContent = 'מתקין...';
    try {
      await installPlugin(btn.dataset.url);
      btn.textContent = 'נשלח ✓';
    } catch (err) {
      btn.textContent = 'שגיאה';
    }
  });

  document.getElementById('lightbox-close').onclick = () => hide('lightbox');
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) hide('lightbox');
  });

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('status-filter').addEventListener('change', render);

  loadPlugins();
</script>
</body>
</html>
